name: Build PhytoNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Create Capacitor project
      run: |
        echo '{
          "name": "PhytoNote",
          "version": "1.0.0",
          "scripts": {
            "build": "echo \"Building PhytoNote...\""
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@capacitor/android": "^6.0.0"
          }
        }' > package.json

    - name: Install dependencies
      run: npm install

    - name: Copy web assets
      run: |
        mkdir -p www
        cp index.html www/
        cp manifest.json www/
        cp sw.js www/
        cp -r css www/
        cp -r js www/
        cp -r icons www/ 2>/dev/null || true
        echo "✅ Web assets copied to www!"

    - name: Initialize Capacitor
      run: |
        npx cap init "PhytoNote" "com.phytonote.app" --web-dir www
        npx cap add android
        npx cap update
        npx cap sync

    - name: Setup app icons for all densities
      run: |
        echo "🎨 Setting up app icons..."
        
        # Создаём папки для иконок
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        # Копируем подготовленные иконки
        # 48×48 → mdpi
        if [ -f "assets/phytonote/icons/icon-48.png" ]; then
          cp assets/phytonote/icons/icon-48.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/phytonote/icons/icon-48.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        fi
        
        # 72×72 → hdpi
        if [ -f "assets/phytonote/icons/icon-72.png" ]; then
          cp assets/phytonote/icons/icon-72.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/phytonote/icons/icon-72.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        fi
        
        # 96×96 → xhdpi
        if [ -f "assets/phytonote/icons/icon-96.png" ]; then
          cp assets/phytonote/icons/icon-96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/phytonote/icons/icon-96.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        fi
        
        # 144×144 → xxhdpi
        if [ -f "assets/phytonote/icons/icon-144.png" ]; then
          cp assets/phytonote/icons/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/phytonote/icons/icon-144.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        fi
        
        # 192×192 → xxxhdpi
        if [ -f "assets/phytonote/icons/icon-192.png" ]; then
          cp assets/phytonote/icons/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp assets/phytonote/icons/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        fi
        
        # Если есть 512×512, используем для всех (запасной вариант)
        if [ -f "assets/phytonote/icons/icon-512.png" ]; then
          cp assets/phytonote/icons/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp assets/phytonote/icons/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        fi
        
        echo "✅ Icons installed successfully!"

    - name: Fix AndroidManifest for launcher icon
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          # Добавляем атрибуты иконки в application
          sed -i 's/<application/<application android:icon="@mipmap\/ic_launcher" android:roundIcon="@mipmap\/ic_launcher_round"/' "$MANIFEST_PATH"
          echo "✅ AndroidManifest updated"
        fi

    - name: Create keystore for signing
      run: |
        echo "🔐 Creating keystore..."
        keytool -genkey -v \
          -keystore phytonote.keystore \
          -alias phytonote \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass phytonote123 \
          -keypass phytonote123 \
          -dname "CN=PhytoNote, OU=App, O=PhytoNote, L=City, S=State, C=US"
        echo "✅ Keystore created: phytonote.keystore"

    - name: Configure release signing in gradle
      run: |
        GRADLE_PATH="android/app/build.gradle"
        if [ -f "$GRADLE_PATH" ]; then
          # Добавляем signingConfigs после android {
          sed -i '/android {/a \    signingConfigs {\n        release {\n            storeFile file("../../../phytonote.keystore")\n            storePassword "phytonote123"\n            keyAlias "phytonote"\n            keyPassword "phytonote123"\n        }\n    }' "$GRADLE_PATH"
          
          # Добавляем signingConfig в release build (после release {)
          sed -i '/release {/a \            signingConfig signingConfigs.release' "$GRADLE_PATH"
          
          echo "✅ Gradle configured for release signing"
        fi

    - name: Set version code and name in gradle
      run: |
        GRADLE_PATH="android/app/build.gradle"
        if [ -f "$GRADLE_PATH" ]; then
          # Устанавливаем versionCode и versionName
          sed -i 's/versionCode 1/versionCode 2/' "$GRADLE_PATH"
          sed -i 's/versionName "1.0"/versionName "1.0.0"/' "$GRADLE_PATH"
          echo "✅ Version set: versionCode=2, versionName=1.0.0"
        fi

    - name: Build Release APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew clean
        ./gradlew assembleRelease
        
        # Проверяем, создался ли APK
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          echo "✅ APK built successfully!"
          ls -la app/build/outputs/apk/release/
        else
          echo "❌ APK not found! Trying debug build..."
          ./gradlew assembleDebug
        fi

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: phytonote-apk-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 7

    - name: Upload Debug APK (fallback)
      uses: actions/upload-artifact@v4
      with:
        name: phytonote-apk-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
