name: Build PhytoNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Create Capacitor project
      run: |
        echo '{
          "name": "PhytoNote",
          "version": "1.0.0",
          "scripts": {
            "build": "echo \"Building PhytoNote...\""
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@capacitor/android": "^6.0.0"
          }
        }' > package.json

    - name: Install dependencies
      run: npm install

    - name: Initialize Capacitor
      run: |
        npx cap init "PhytoNote" "com.phytonote.app" --web-dir www
        npx cap add android

    - name: Fix Android project
      run: |
        cd android

        # Создаём MainActivity.java
        mkdir -p app/src/main/java/com/phytonote/app
        cat > app/src/main/java/com/phytonote/app/MainActivity.java << 'EOF'
        package com.phytonote.app;

        import android.os.Bundle;
        import com.getcapacitor.BridgeActivity;

        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
            }
        }
        EOF

        # Создаём colors.xml
        mkdir -p app/src/main/res/values
        cat > app/src/main/res/values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="colorPrimary">#1e3a1e</color>
            <color name="colorPrimaryDark">#1e3a1e</color>
            <color name="colorAccent">#3a7a3a</color>
        </resources>
        EOF

        # Обновляем build.gradle
        cat > app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
            namespace "com.phytonote.app"
            compileSdkVersion 35
            defaultConfig {
                applicationId "com.phytonote.app"
                minSdkVersion 23
                targetSdkVersion 35
                versionCode 1
                versionName "1.0"
                testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
            }
            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
            }
        }
        repositories {
            google()
            mavenCentral()
        }
        dependencies {
            implementation fileTree(dir: 'libs', include: ['*.jar'])
            implementation 'androidx.appcompat:appcompat:1.7.0'
            implementation 'com.google.android.material:material:1.12.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
            implementation 'androidx.core:core-splashscreen:1.0.1'
            implementation project(':capacitor-android')
            testImplementation 'junit:junit:4.13.2'
            androidTestImplementation 'androidx.test.ext:junit:1.2.1'
            androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
        }
        EOF

        # Создаём styles.xml
        cat > app/src/main/res/values/styles.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="colorPrimary">@color/colorPrimary</item>
                <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                <item name="colorAccent">@color/colorAccent</item>
            </style>

            <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">
                <item name="android:background">@color/colorPrimary</item>
                <item name="windowSplashScreenBackground">@color/colorPrimary</item>
                <item name="windowSplashScreenAnimatedIcon">@mipmap/ic_launcher</item>
                <item name="postSplashScreenTheme">@style/AppTheme</item>
            </style>
        </resources>
        EOF

        # Создаём AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.phytonote.app">

            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/AppTheme.NoActionBarLaunch">

                <activity
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                    android:name="com.phytonote.app.MainActivity"
                    android:label="@string/app_name"
                    android:theme="@style/AppTheme.NoActionBarLaunch"
                    android:exported="true">

                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>

                </activity>

            </application>

        </manifest>
        EOF

        # Создаём strings.xml
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">PhytoNote</string>
        </resources>
        EOF

    - name: Copy web assets
      run: |
        mkdir -p www
        cp -r assets/* www/
        echo "✅ All files copied to www!"

    - name: Use custom icon as app icon
      run: |
        if [ -f "assets/icon-192.png" ]; then
          echo "🎨 Found icon-192.png - setting as app icon!"
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp assets/icon-192.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          echo "✅ Icon set successfully!"
        else
          echo "⚠️  icon-192.png not found - using default Capacitor icon"
        fi

    - name: Build Android APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phytonote-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
