name: Build PhytoNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Create Capacitor project
      run: |
        echo '{
          "name": "PhytoNote",
          "version": "1.0.0",
          "scripts": {
            "build": "echo \"Building PhytoNote...\""
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@capacitor/android": "^6.0.0"
          }
        }' > package.json

    - name: Install dependencies
      run: npm install

    - name: Copy web assets BEFORE Capacitor init
      run: |
        mkdir -p www
        cp -r assets/* www/
        echo "✅ All files copied to www!"

    - name: Initialize Capacitor and add Android
      run: |
        npx cap init "PhytoNote" "com.phytonote.app" --web-dir www
        npx cap add android
        npx cap update

    - name: Setup app icons
      run: |
        echo "🎨 Setting up app icons..."
        
        # Создаём папки для иконок
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        # Путь к иконкам (ваши иконки лежат в assets/)
        ICON_PATH="assets/phytonote/icons"
        
        # Проверяем, есть ли иконки
        if [ -d "$ICON_PATH" ]; then
          echo "📂 Found icons in: $ICON_PATH"
          ls -la $ICON_PATH
          
          # Копируем по размерам
          [ -f "$ICON_PATH/icon-48.png" ] && cp "$ICON_PATH/icon-48.png" android/app/src/main/res/mipmap-mdpi/ic_launcher.png && echo "✅ 48px"
          [ -f "$ICON_PATH/icon-72.png" ] && cp "$ICON_PATH/icon-72.png" android/app/src/main/res/mipmap-hdpi/ic_launcher.png && echo "✅ 72px"
          [ -f "$ICON_PATH/icon-96.png" ] && cp "$ICON_PATH/icon-96.png" android/app/src/main/res/mipmap-xhdpi/ic_launcher.png && echo "✅ 96px"
          [ -f "$ICON_PATH/icon-144.png" ] && cp "$ICON_PATH/icon-144.png" android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png && echo "✅ 144px"
          [ -f "$ICON_PATH/icon-192.png" ] && cp "$ICON_PATH/icon-192.png" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png && echo "✅ 192px"
          
          # Копируем round иконки
          [ -f "$ICON_PATH/icon-48.png" ] && cp "$ICON_PATH/icon-48.png" android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          [ -f "$ICON_PATH/icon-72.png" ] && cp "$ICON_PATH/icon-72.png" android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          [ -f "$ICON_PATH/icon-96.png" ] && cp "$ICON_PATH/icon-96.png" android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          [ -f "$ICON_PATH/icon-144.png" ] && cp "$ICON_PATH/icon-144.png" android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          [ -f "$ICON_PATH/icon-192.png" ] && cp "$ICON_PATH/icon-192.png" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        else
          echo "⚠️ Icons not found in $ICON_PATH"
        fi

    - name: Fix AndroidManifest for launcher icon
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          sed -i 's/<application/<application android:icon="@mipmap\/ic_launcher" android:roundIcon="@mipmap\/ic_launcher_round"/' "$MANIFEST_PATH"
          echo "✅ AndroidManifest updated"
        fi

    - name: Create keystore for signing
      run: |
        echo "🔐 Creating keystore..."
        keytool -genkey -v \
          -keystore phytonote.keystore \
          -alias phytonote \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass phytonote123 \
          -keypass phytonote123 \
          -dname "CN=PhytoNote, OU=App, O=PhytoNote, L=City, S=State, C=US"
        echo "✅ Keystore created"

    - name: Configure signing in gradle
      run: |
        GRADLE_PATH="android/app/build.gradle"
        if [ -f "$GRADLE_PATH" ]; then
          # Добавляем signingConfigs
          sed -i '/android {/a \    signingConfigs {\n        release {\n            storeFile file("../../../phytonote.keystore")\n            storePassword "phytonote123"\n            keyAlias "phytonote"\n            keyPassword "phytonote123"\n        }\n    }' "$GRADLE_PATH"
          
          # Добавляем signingConfig в release build
          sed -i '/release {/a \            signingConfig signingConfigs.release' "$GRADLE_PATH"
          
          echo "✅ Gradle configured for release signing"
        fi

    - name: Use custom icon as app icon
      run: |
        if [ -f "assets/icon-192.png" ]; then
          echo "🎨 Found icon-192.png - setting as app icon!"
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp assets/icon-192.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          echo "✅ Icon set successfully!"
        else
          echo "⚠️ icon-192.png not found - using default Capacitor icon"
        fi

    - name: Build Android APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phytonote-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 7
