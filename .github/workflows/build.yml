name: Build PhytoNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Capacitor
      run: |
        npm init -y
        npm install @capacitor/cli @capacitor/android

    - name: Copy web files to www
      run: |
        mkdir -p www
        # Копируем ВСЁ из phytonote в www
        cp -r phytonote/* www/
        echo "✅ Files copied!"
        ls -la www/

    - name: Build with Capacitor
      run: |
        npx cap init PhytoNote com.phytonote.app --web-dir www
        npx cap add android
        npx cap sync

    - name: Setup app icons
      run: |
        echo "🎨 Setting up icons..."
        
        # Создаём папки для иконок
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        # Путь к иконкам (в папке phytonote/icons/)
        ICON_PATH="phytonote/icons"
        
        echo "📂 Looking for icons in: $ICON_PATH"
        ls -la $ICON_PATH
        
        # Копируем иконки по размерам
        # 48×48 → mdpi
        if [ -f "$ICON_PATH/icon-48.png" ]; then
          cp "$ICON_PATH/icon-48.png" android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp "$ICON_PATH/icon-48.png" android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          echo "✅ icon-48.png → mdpi"
        fi
        
        # 72×72 → hdpi
        if [ -f "$ICON_PATH/icon-72.png" ]; then
          cp "$ICON_PATH/icon-72.png" android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp "$ICON_PATH/icon-72.png" android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          echo "✅ icon-72.png → hdpi"
        fi
        
        # 96×96 → xhdpi
        if [ -f "$ICON_PATH/icon-96.png" ]; then
          cp "$ICON_PATH/icon-96.png" android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp "$ICON_PATH/icon-96.png" android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          echo "✅ icon-96.png → xhdpi"
        fi
        
        # 144×144 → xxhdpi
        if [ -f "$ICON_PATH/icon-144.png" ]; then
          cp "$ICON_PATH/icon-144.png" android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp "$ICON_PATH/icon-144.png" android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          echo "✅ icon-144.png → xxhdpi"
        fi
        
        # 192×192 → xxxhdpi
        if [ -f "$ICON_PATH/icon-192.png" ]; then
          cp "$ICON_PATH/icon-192.png" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp "$ICON_PATH/icon-192.png" android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          echo "✅ icon-192.png → xxxhdpi"
        fi
        
        echo "✅ All icons installed!"

    - name: Create keystore
      run: |
        keytool -genkey -v \
          -keystore phytonote.keystore \
          -alias phytonote \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass phytonote123 \
          -keypass phytonote123 \
          -dname "CN=PhytoNote, OU=App, O=PhytoNote, L=City, S=State, C=US"

    - name: Configure signing
      run: |
        cd android
        cat >> app/build.gradle << 'EOF'

        android {
            signingConfigs {
                release {
                    storeFile file("../../../phytonote.keystore")
                    storePassword "phytonote123"
                    keyAlias "phytonote"
                    keyPassword "phytonote123"
                }
            }
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                }
            }
        }
        EOF
        
        echo "✅ Signing configured"

    - name: Build APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phytonote-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 7
