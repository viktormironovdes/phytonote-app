name: Build PhytoNote APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Create Capacitor project
      run: |
        echo '{
          "name": "PhytoNote",
          "version": "1.0.0",
          "scripts": {
            "build": "echo \"Building PhytoNote...\""
          },
          "devDependencies": {
            "@capacitor/cli": "^6.0.0",
            "@capacitor/android": "^6.0.0"
          }
        }' > package.json

    - name: Install dependencies
      run: npm install

    - name: Initialize Capacitor and add Android
      run: |
        npx cap init "PhytoNote" "com.phytonote.app" --web-dir www
        npx cap add android
        # Принудительно обновляем Capacitor, чтобы он создал все нужные файлы
        npx cap update

    - name: Copy web assets
      run: |
        mkdir -p www
        cp -r assets/* www/
        echo "✅ All files copied to www!"

    - name: Use custom icon as app icon
      run: |
        if [ -f "assets/icon-192.png" ]; then
          echo "🎨 Found icon-192.png - setting as app icon!"
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp assets/icon-192.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/icon-192.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          echo "✅ Icon set successfully!"
        else
          echo "⚠️  icon-192.png not found - using default Capacitor icon"
        fi

    - name: Build Android APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: phytonote-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
